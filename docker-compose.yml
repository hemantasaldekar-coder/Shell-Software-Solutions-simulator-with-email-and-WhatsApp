services:
  web:
    build:
      context: .
    command: npm run dev
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    volumes:
      - type: bind
        source: .
        target: /app
        read_only: true
      - node_modules:/app/node_modules
    user: node
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m,mode=1777
      - /app/.next:rw,noexec,nosuid,size=256m,uid=1000,gid=1000
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  node_modules:
